<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP-001 Calibration Validator | ACI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d10;
      --panel: #0f1318;
      --line: #1e2d3d;
      --ink: #e9eef5;
      --muted: #7a8a9a;
      --accent: #9dd6ff;
      --green: #c7ffb5;
      --warn: #ffd18a;
      --danger: #ff9aa5;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    header {
      border-bottom: 1px solid var(--line);
      padding: 14px 20px;
      background: rgba(11,13,16,.95);
      position: sticky; top: 0; z-index: 20;
    }
    .h-inner { max-width: 820px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .h-left .kicker { font-family: var(--mono); font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 2px; }
    .h-left h1 { font-size: 1rem; font-weight: 600; }
    .badge { font-family: var(--mono); font-size: .63rem; border: 1px solid var(--line); padding: 3px 9px; border-radius: 4px; color: var(--muted); }
    .badge.live { border-color: rgba(199,255,181,.3); color: var(--green); }

    main { max-width: 820px; margin: 0 auto; padding: 20px; }

    .card { background: rgba(15,19,24,.7); border: 1px solid var(--line); border-radius: 8px; padding: 16px 18px; margin-bottom: 16px; }
    .sec-label { font-family: var(--mono); font-size: .65rem; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 12px; }

    /* Proxy row */
    .proxy-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type="text"] {
      flex: 1; min-width: 220px;
      background: rgba(0,0,0,.5); border: 1px solid var(--line);
      border-radius: 6px; color: var(--ink);
      font-family: var(--mono); font-size: .78rem;
      padding: 8px 12px; outline: none;
    }
    input:focus { border-color: var(--accent); }
    .btn { font-family: var(--mono); font-size: .73rem; padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
    .btn:hover { opacity: .8; }
    .btn-go  { background: var(--accent); color: #0b0d10; font-weight: 700; }
    .btn-sec { background: rgba(30,45,61,.8); color: var(--ink); border: 1px solid var(--line); }
    .btn-grn { background: rgba(199,255,181,.12); color: var(--green); border: 1px solid rgba(199,255,181,.2); }
    .proxy-status { font-family: var(--mono); font-size: .72rem; margin-top: 8px; color: var(--muted); }
    .proxy-status.ok  { color: var(--green); }
    .proxy-status.err { color: var(--danger); }

    /* Status bar */
    #sb { display:none; font-family: var(--mono); font-size:.73rem; padding: 9px 13px; border-radius: 7px; margin-bottom:14px; }
    #sb.info { background: rgba(157,214,255,.06); border: 1px solid rgba(157,214,255,.2); color: var(--accent); }
    #sb.ok   { background: rgba(199,255,181,.06); border: 1px solid rgba(199,255,181,.2); color: var(--green); }
    #sb.err  { background: rgba(255,154,165,.06); border: 1px solid rgba(255,154,165,.2); color: var(--danger); }

    /* Progress */
    .prog-wrap { margin-bottom: 16px; display: none; }
    .prog-label { font-family: var(--mono); font-size: .67rem; color: var(--muted); margin-bottom: 5px; }
    .prog-bar { height: 3px; background: rgba(36,48,64,.6); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

    /* Validation table */
    table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    th { font-family: var(--mono); font-size: .63rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--line); background: rgba(15,25,35,.4); }
    td { padding: 10px 10px; border-bottom: 1px solid rgba(30,45,61,.4); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .param-name { color: var(--ink); }
    .param-desc { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .num-cell { font-family: var(--mono); font-size: .88rem; text-align: right; }
    .num-paper { color: rgba(157,214,255,.5); }
    .num-actual { color: var(--ink); }
    .status-cell { text-align: center; }
    .badge-match { font-family: var(--mono); font-size: .65rem; padding: 2px 7px; border-radius: 3px; }
    .badge-ok   { background: rgba(199,255,181,.1); color: var(--green);  border: 1px solid rgba(199,255,181,.2); }
    .badge-warn { background: rgba(255,209,138,.08); color: var(--warn);  border: 1px solid rgba(255,209,138,.18); }
    .badge-fail { background: rgba(255,154,165,.08); color: var(--danger); border: 1px solid rgba(255,154,165,.18); }
    .badge-pend { background: rgba(30,45,61,.4); color: var(--muted); border: 1px solid var(--line); }
    .delta-cell { font-family: var(--mono); font-size: .78rem; text-align: right; color: var(--muted); }

    /* Summary */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 18px; }
    .sum-card { background: rgba(15,19,24,.6); border: 1px solid var(--line); border-radius: 7px; padding: 12px 14px; }
    .sum-val { font-family: var(--mono); font-size: 1.5rem; font-weight: 700; }
    .sum-val.green  { color: var(--green); }
    .sum-val.warn   { color: var(--warn); }
    .sum-val.danger { color: var(--danger); }
    .sum-val.muted  { color: rgba(157,214,255,.25); }
    .sum-lbl { font-family: var(--mono); font-size: .62rem; color: var(--muted); margin-top: 4px; }

    /* Verdict */
    #verdict { display: none; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; font-size: .85rem; line-height: 1.7; }
    #verdict.ok   { background: rgba(199,255,181,.06); border: 1px solid rgba(199,255,181,.2); }
    #verdict.warn { background: rgba(255,209,138,.06); border: 1px solid rgba(255,209,138,.18); }
    #verdict.fail { background: rgba(255,154,165,.06); border: 1px solid rgba(255,154,165,.18); }
    #verdict .v-title { font-family: var(--mono); font-size: .8rem; font-weight: 700; margin-bottom: 6px; }

    /* Raw data */
    .raw-toggle { font-family: var(--mono); font-size: .65rem; color: var(--muted); cursor: pointer; margin-bottom: 8px; display: inline-block; }
    .raw-toggle:hover { color: var(--accent); }
    #raw-out { display: none; background: rgba(0,0,0,.5); border: 1px solid var(--line); border-radius: 6px; padding: 12px; font-family: var(--mono); font-size: .68rem; color: var(--muted); max-height: 200px; overflow-y: auto; white-space: pre; }

    /* Log */
    .log-wrap { background: rgba(0,0,0,.4); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .log-top { padding: 8px 14px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    #log { padding: 10px 14px; font-family: var(--mono); font-size: .67rem; color: var(--muted); line-height: 1.85; max-height: 160px; overflow-y: auto; }
    .ll-ok   { color: var(--green); }
    .ll-err  { color: var(--danger); }
    .ll-info { color: var(--accent); }
    .ll-warn { color: var(--warn); }

    .spin { display: inline-block; width: 9px; height: 9px; border: 1.5px solid rgba(157,214,255,.2); border-top-color: var(--accent); border-radius: 50%; animation: sp .65s linear infinite; margin-right: 5px; vertical-align: middle; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .export-row { display: flex; gap: 8px; flex-wrap: wrap; }

    @media (max-width: 540px) {
      .delta-cell, th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="h-inner">
    <div class="h-left">
      <div class="kicker">Aether Continuity Institute · WP-001</div>
      <h1>Calibration Validator — Fingrid Historical Data</h1>
    </div>
    <span class="badge" id="conn-badge">● Ei yhteyttä</span>
  </div>
</header>

<main>

  <!-- PROXY -->
  <div class="card">
    <div class="sec-label">Proxy</div>
    <div class="proxy-row">
      <input type="text" id="proxy-url"
        value="https://aci-fingrid-proxy.ruotsalainen-marko.workers.dev/api"
        placeholder="https://proxy.workers.dev/api" />
      <button class="btn btn-grn" onclick="testProxy()">⚡ Testaa</button>
    </div>
    <div class="proxy-status" id="ps">— ei testattu</div>
  </div>

  <!-- FETCH -->
  <div style="margin-bottom:16px;">
    <button class="btn btn-go" style="width:100%;padding:12px;font-size:.82rem;" onclick="runValidation()">
      ▶ Hae Fingrid-data ja validoi kalibrointi (2015–2024)
    </button>
  </div>

  <div class="prog-wrap" id="prog-wrap">
    <div class="prog-label" id="prog-label">Haetaan...</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="sb"></div>
  <div id="verdict"></div>

  <!-- SUMMARY -->
  <div class="summary-grid" id="sum-grid" style="display:none"></div>

  <!-- VALIDATION TABLE -->
  <div class="sec-label" id="table-label" style="display:none">Parametrivertailu</div>
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;" id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Parametri</th>
          <th style="text-align:right">Paperi</th>
          <th style="text-align:right">Fingrid-data</th>
          <th style="text-align:right">Δ</th>
          <th style="text-align:center">Status</th>
        </tr>
      </thead>
      <tbody id="val-tbody"></tbody>
    </table>
  </div>

  <!-- EXPORT -->
  <div class="export-row" id="export-row" style="display:none;margin-bottom:16px;">
    <button class="btn btn-sec" onclick="exportJSON()">⬇ Vie JSON (validointiraportti)</button>
    <button class="btn btn-sec" onclick="exportCSV()">⬇ Vie CSV (raakadata)</button>
  </div>

  <!-- RAW -->
  <span class="raw-toggle" id="raw-toggle" onclick="toggleRaw()" style="display:none">▶ Näytä raakadata</span>
  <div id="raw-out"></div>

  <!-- LOG -->
  <div class="log-wrap" style="margin-top:16px;">
    <div class="log-top">
      <span class="sec-label" style="margin:0;">Fetch Log</span>
      <button class="btn btn-sec" style="font-size:.6rem;padding:2px 8px;" onclick="document.getElementById('log').innerHTML=''">Tyhjennä</button>
    </div>
    <div id="log"></div>
  </div>

</main>

<script>
// ── PAPER'S CALIBRATED PARAMETERS ─────────────────────────────────────────
const PAPER = {
  ar1_rho:           { val: 0.9315,  tol: 0.05,  label: "AR(1) ρ — tuulivoima",        desc: "Persistenssikerroin, wind AR(1)" },
  residual_std:      { val: 449.4,   tol: 80,    label: "Residuaali σ (MW)",            desc: "AR(1) residuaalin keskihajonta" },
  lw_events_yr:      { val: 84,      tol: 20,    label: "Low-wind jaksoja / vuosi",     desc: "< 10 % kapasiteetista" },
  lw_mean_dur:       { val: 3.19,    tol: 1.0,   label: "Low-wind kesto ka (h)",        desc: "Keskimääräinen jakson pituus" },
  lw_p90_dur:        { val: 7.0,     tol: 3.0,   label: "Low-wind P90 kesto (h)",       desc: "90. persentiili jakson pituus" },
  lw_max_dur:        { val: 45.0,    tol: 20,    label: "Low-wind max kesto (h)",       desc: "Pisin havaittu jakso" },
  demand_ar1_rho:    { val: 0.9175,  tol: 0.05,  label: "AR(1) ρ_D — kulutus",         desc: "Kulutusresidualien persistenssi" },
  demand_res_std:    { val: 220.2,   tol: 60,    label: "Kulutus residuaali σ (MW)",    desc: "Tunnittainen kulutushajonta" },
};

// Dataset IDs
const DS_WIND     = 181;
const DS_CONS     = 193;

// Finnish installed wind capacity by year (MW) — source: Fingrid/WindEurope annual statistics
// Used to compute low-wind threshold (<10% of installed capacity) per year
const INST_CAP_BY_YEAR = {
  2010:  197, 2011:  197, 2012:  288, 2013:  448, 2014:  627,
  2015:  872, 2016: 1533, 2017: 2044, 2018: 2041, 2019: 2284,
  2020: 2586, 2021: 3099, 2022: 5677, 2023: 6993, 2024: 7400,
};

let rawWind = [], rawCons = [], results = {}, rawData = {};

function proxy() {
  return document.getElementById('proxy-url').value.trim().replace(/\/$/, '');
}

// ── PROXY TEST ──────────────────────────────────────────────────────────────
async function testProxy() {
  const ps = document.getElementById('ps');
  ps.className = 'proxy-status'; ps.textContent = '⟳ Testataan...';
  try {
    const url = `${proxy()}?ds=${DS_WIND}&size=1`;
    const r = await fetchJson(url);
    const rows = r.data || [];
    if (!rows.length) throw new Error('Ei dataa palautunut');
    ps.className = 'proxy-status ok';
    ps.textContent = `✓ Proxy toimii — DS ${DS_WIND}: ${rows[0].value} MWh/h @ ${rows[0].startTime?.slice(0,16) || '?'}`;
    setBadge('● Live', true);
    addLog('ok', `Proxy OK — arvo ${rows[0].value}`);
  } catch(e) {
    ps.className = 'proxy-status err';
    ps.textContent = '✕ Virhe: ' + e.message;
    setBadge('● Virhe', false);
    addLog('err', 'Proxy-testi epäonnistui: ' + e.message);
  }
}

// ── MAIN VALIDATION ─────────────────────────────────────────────────────────
async function runValidation() {
  setStatus('<span class="spin"></span>Haetaan historiadataa proxyn kautta…', 'info');
  showProgress(true, 'Haetaan tuulivoimadata (DS 181)…', 5);
  addLog('info', 'Aloitetaan validointi — 2015–2024');

  try {
    // Fetch wind data — 2015 to 2024, batch by year to avoid timeout
    rawWind = await fetchYearRange(DS_WIND, 2015, 2024, (y, total) => {
      showProgress(true, `Tuulivoimadata: vuosi ${y}/2024`, 5 + (y - 2015) / 10 * 40);
    });
    addLog('ok', `Tuulivoimadata: ${rawWind.length.toLocaleString('fi-FI')} riviä`);

    showProgress(true, 'Haetaan kulutusdata (DS 193)…', 50);
    rawCons = await fetchYearRange(DS_CONS, 2015, 2024, (y) => {
      showProgress(true, `Kulutusdata: vuosi ${y}/2024`, 50 + (y - 2015) / 10 * 40);
    });
    addLog('ok', `Kulutusdata: ${rawCons.length.toLocaleString('fi-FI')} riviä`);

    showProgress(true, 'Lasketaan parametrit…', 92);

    // Compute
    const windRes   = computeWind(rawWind);
    const demandRes = computeDemand(rawCons);
    results = { ...windRes, ...demandRes };
    rawData = { wind: rawWind.slice(0, 5), demand: rawCons.slice(0, 5), computed: results };

    showProgress(true, 'Valmis.', 100);
    renderTable(results);
    renderSummary(results);
    renderVerdict(results);

    document.getElementById('export-row').style.display = 'flex';
    document.getElementById('raw-toggle').style.display = 'inline-block';
    document.getElementById('raw-out').textContent = JSON.stringify(rawData, null, 2);

    setStatus('✓ Validointi valmis', 'ok');
    addLog('ok', 'Kaikki parametrit laskettu');

  } catch(e) {
    setStatus('✕ Virhe: ' + e.message, 'err');
    addLog('err', 'Validointi keskeytyi: ' + e.message);
    console.error(e);
  }

  setTimeout(() => showProgress(false), 1200);
}

// ── DATA FETCH HELPERS ───────────────────────────────────────────────────────
async function fetchYearRange(dsId, startYear, endYear, onProgress) {
  let all = [];
  for (let y = startYear; y <= endYear; y++) {
    if (onProgress) onProgress(y, endYear);
    const start = `${y}-01-01T00:00:00Z`;
    const end   = `${y}-12-31T23:59:59Z`;
    const url   = `${proxy()}?ds=${dsId}&start=${start}&end=${end}&size=20000`;
    try {
      const r = await fetchJson(url);
      const rows = r.data || [];
      all = all.concat(rows);
      addLog('info', `DS ${dsId} vuosi ${y}: ${rows.length} riviä`);
    } catch(e) {
      addLog('warn', `DS ${dsId} vuosi ${y} epäonnistui: ${e.message}`);
    }
    await sleep(800);
  }
  return all;
}

async function fetchJson(url, retries = 3) {
  for (let i = 0; i < retries; i++) {
    const r = await fetch(url);
    if (r.ok) return r.json();
    if (r.status === 429) { await sleep(2500 * (i + 1)); continue; }
    throw new Error(`HTTP ${r.status}`);
  }
  throw new Error('Max retries exceeded');
}

// ── WIND COMPUTATION ─────────────────────────────────────────────────────────
function computeWind(rows) {
  if (rows.length < 100) throw new Error('Liian vähän tuulivoima-dataa');

  // Parse raw observations
  const raw = rows
    .map(r => ({ t: new Date(r.startTime || r.start_time || r.time), v: +r.value }))
    .filter(r => !isNaN(r.v) && !isNaN(r.t))
    .sort((a, b) => a.t - b.t);

  // Resample to hourly means — handles 15-min or other sub-hourly resolution
  const hourMap = {};
  for (const p of raw) {
    const key = new Date(
      p.t.getFullYear(), p.t.getMonth(), p.t.getDate(), p.t.getHours()
    ).getTime();
    if (!hourMap[key]) hourMap[key] = [];
    hourMap[key].push(p.v);
  }
  const series = Object.entries(hourMap)
    .map(([ts, vs]) => ({ t: new Date(+ts), v: vs.reduce((s,v) => s+v, 0) / vs.length }))
    .sort((a, b) => a.t - b.t);

  addLog('info', `Resamplingi: ${raw.length.toLocaleString('fi-FI')} havaintoa → ${series.length.toLocaleString('fi-FI')} tuntia`);

  const vals = series.map(r => r.v);
  const months = series.map(r => r.t.getMonth());

  // Monthly mean by index
  const monthMeans = Array(12).fill(0).map((_, m) => {
    const mv = vals.filter((_, i) => months[i] === m);
    return mv.reduce((s, v) => s + v, 0) / (mv.length || 1);
  });

  const residuals = vals.map((v, i) => v - monthMeans[months[i]]);

  // AR(1)
  const n = residuals.length - 1;
  let sx = 0, sy = 0, sxx = 0, sxy = 0;
  for (let i = 0; i < n; i++) {
    sx  += residuals[i];
    sy  += residuals[i + 1];
    sxx += residuals[i] * residuals[i];
    sxy += residuals[i] * residuals[i + 1];
  }
  const rho = (n * sxy - sx * sy) / (n * sxx - sx * sx);
  const resStd = std(residuals) * Math.sqrt(1 - rho * rho);

  // Low-wind episodes — threshold is 10% of year-specific installed capacity
  const episodes = [];
  let inEp = false, epLen = 0;
  for (let i = 0; i < vals.length; i++) {
    const year = series[i].t.getFullYear();
    const cap  = INST_CAP_BY_YEAR[year] || INST_CAP_BY_YEAR[2024];
    const thresh = cap * 0.10;
    if (vals[i] < thresh) { inEp = true; epLen++; }
    else if (inEp)        { episodes.push(epLen); inEp = false; epLen = 0; }
  }
  if (inEp) episodes.push(epLen);

  const years = (series[series.length - 1].t - series[0].t) / (365.25 * 24 * 3600 * 1000);
  const eventsPerYear = episodes.length / years;
  const meanDur = mean(episodes);
  const p90Dur  = percentile(episodes, 90);
  const maxDur  = Math.max(...episodes);

  addLog('info', `AR(1) ρ = ${rho.toFixed(4)}, σ = ${resStd.toFixed(1)} MW, ${episodes.length} low-wind jaksoa (vuosittainen kapasiteetti)`);
  addLog('info', `Kapasiteetti: 2015=${INST_CAP_BY_YEAR[2015]} MW → 2024=${INST_CAP_BY_YEAR[2024]} MW`);

  return { ar1_rho: rho, residual_std: resStd, lw_events_yr: eventsPerYear,
           lw_mean_dur: meanDur, lw_p90_dur: p90Dur, lw_max_dur: maxDur };
}

// ── DEMAND COMPUTATION ───────────────────────────────────────────────────────
function computeDemand(rows) {
  if (rows.length < 100) throw new Error('Liian vähän kulutusdata');

  // Parse and resample to hourly
  const raw = rows
    .map(r => ({ t: new Date(r.startTime || r.start_time || r.time), v: +r.value }))
    .filter(r => !isNaN(r.v) && !isNaN(r.t))
    .sort((a, b) => a.t - b.t);

  const hourMap = {};
  for (const p of raw) {
    const key = new Date(
      p.t.getFullYear(), p.t.getMonth(), p.t.getDate(), p.t.getHours()
    ).getTime();
    if (!hourMap[key]) hourMap[key] = [];
    hourMap[key].push(p.v);
  }
  const series = Object.entries(hourMap)
    .map(([ts, vs]) => ({ t: new Date(+ts), v: vs.reduce((s,v) => s+v, 0) / vs.length }))
    .sort((a, b) => a.t - b.t);

  addLog('info', `Kulutus resamplingi: ${raw.length.toLocaleString('fi-FI')} → ${series.length.toLocaleString('fi-FI')} tuntia`);

  const vals   = series.map(r => r.v);
  const months = series.map(r => r.t.getMonth());
  const hours  = series.map(r => r.t.getHours());

  // Seasonal+diurnal mean
  const mmh = {};
  vals.forEach((v, i) => {
    const k = `${months[i]}-${hours[i]}`;
    if (!mmh[k]) mmh[k] = [];
    mmh[k].push(v);
  });
  const seasonal = vals.map((v, i) => {
    const k = `${months[i]}-${hours[i]}`;
    return mean(mmh[k]);
  });

  const resid = vals.map((v, i) => v - seasonal[i]);

  // AR(1) on residuals
  const n = resid.length - 1;
  let sx = 0, sy = 0, sxx = 0, sxy = 0;
  for (let i = 0; i < n; i++) {
    sx  += resid[i];
    sy  += resid[i + 1];
    sxx += resid[i] * resid[i];
    sxy += resid[i] * resid[i + 1];
  }
  const rhoD = (n * sxy - sx * sy) / (n * sxx - sx * sx);
  const resStdD = std(resid) * Math.sqrt(1 - rhoD * rhoD);

  addLog('info', `Kulutus AR(1) ρ_D = ${rhoD.toFixed(4)}, σ_D = ${resStdD.toFixed(1)} MW`);

  return { demand_ar1_rho: rhoD, demand_res_std: resStdD };
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderTable(res) {
  document.getElementById('table-label').style.display = 'block';
  document.getElementById('table-wrap').style.display  = 'block';

  const rows = Object.entries(PAPER).map(([key, p]) => {
    const actual = res[key];
    const haval  = actual !== undefined;
    const delta  = haval ? Math.abs(actual - p.val) : null;
    const pct    = haval ? delta / Math.max(Math.abs(p.val), 0.001) * 100 : null;
    let badge, cls;
    if (!haval)       { badge = 'odottaa'; cls = 'badge-pend'; }
    else if (delta <= p.tol) { badge = '✓ MATCH'; cls = 'badge-ok'; }
    else if (delta <= p.tol * 2) { badge = '~ LÄHELLÄ'; cls = 'badge-warn'; }
    else              { badge = '✕ ERO'; cls = 'badge-fail'; }

    return `<tr>
      <td><div class="param-name">${p.label}</div><div class="param-desc">${p.desc}</div></td>
      <td class="num-cell num-paper">${p.val}</td>
      <td class="num-cell num-actual">${haval ? actual.toFixed(3) : '—'}</td>
      <td class="delta-cell">${delta !== null ? delta.toFixed(3) : '—'}</td>
      <td class="status-cell"><span class="badge-match ${cls}">${badge}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('val-tbody').innerHTML = rows;
}

function renderSummary(res) {
  const checks = Object.entries(PAPER).map(([key, p]) => {
    const a = res[key];
    if (a === undefined) return 'pend';
    return Math.abs(a - p.val) <= p.tol ? 'ok' : Math.abs(a - p.val) <= p.tol * 2 ? 'warn' : 'fail';
  });
  const nOk   = checks.filter(c => c === 'ok').length;
  const nWarn = checks.filter(c => c === 'warn').length;
  const nFail = checks.filter(c => c === 'fail').length;
  const total = Object.keys(PAPER).length;

  document.getElementById('sum-grid').style.display = 'grid';
  document.getElementById('sum-grid').innerHTML = `
    <div class="sum-card"><div class="sum-val green">${nOk}</div><div class="sum-lbl">✓ MATCH (toleranssissa)</div></div>
    <div class="sum-card"><div class="sum-val warn">${nWarn}</div><div class="sum-lbl">~ LÄHELLÄ (2× toleranssi)</div></div>
    <div class="sum-card"><div class="sum-val ${nFail > 0 ? 'danger' : 'muted'}">${nFail}</div><div class="sum-lbl">✕ ERO (> 2× toleranssi)</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--accent)">${total}</div><div class="sum-lbl">Parametriä yhteensä</div></div>`;
}

function renderVerdict(res) {
  const checks = Object.entries(PAPER).map(([key, p]) => {
    const a = res[key];
    if (a === undefined) return 'pend';
    return Math.abs(a - p.val) <= p.tol ? 'ok' : Math.abs(a - p.val) <= p.tol * 2 ? 'warn' : 'fail';
  });
  const nFail = checks.filter(c => c === 'fail').length;
  const nWarn = checks.filter(c => c === 'warn').length;

  const v = document.getElementById('verdict');
  v.style.display = 'block';

  if (nFail === 0 && nWarn === 0) {
    v.className = 'ok';
    v.innerHTML = `<div class="v-title" style="color:var(--green)">✓ KALIBROINTI VAHVISTETTU</div>
      Kaikki parametrit ovat paperin arvojen toleranssissa. Fingrid-historiadatan perusteella 
      WP-001:n kalibrointi on empirisesti perusteltu. Limitations-osio voidaan päivittää: 
      <em>"Synthetic calibration validated against real Fingrid hourly data (2015–2024)."</em>`;
  } else if (nFail === 0) {
    v.className = 'warn';
    v.innerHTML = `<div class="v-title" style="color:var(--warn)">~ KALIBROINTI PÄÄOSIN VAHVISTETTU</div>
      ${nWarn} parametriä on lähellä mutta ei tarkkaan toleranssissa. Tämä voi heijastaa 
      asennetun kapasiteetin kasvua (INST_CAP_MW-parametri tarkistettava). Tulos on 
      riittävä paperin robustisuusargumentille — mainitse sensitiivisyysanalyysissä.`;
  } else {
    v.className = 'fail';
    v.innerHTML = `<div class="v-title" style="color:var(--danger)">⚠ EROAVAISUUKSIA — TARKISTA</div>
      ${nFail} parametriä poikkeaa toleranssista merkittävästi. Mahdolliset syyt: 
      (1) installed capacity -parametri ei vastaa historiallista keskiarvoa, 
      (2) data-aikaikkunassa ero paperin kalibrointiin, 
      (3) proxyn palauttama data on osittaista. Tarkista loki.`;
  }
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function exportJSON() {
  const payload = {
    tool: 'WP-001-calibration-validator',
    generated: new Date().toISOString(),
    data_window: '2015-01-01 / 2024-12-31',
    paper_params: PAPER,
    computed: results,
    comparison: Object.fromEntries(Object.entries(PAPER).map(([k, p]) => {
      const a = results[k];
      return [k, { paper: p.val, actual: a, delta: a !== undefined ? Math.abs(a - p.val) : null,
                   tolerance: p.tol, match: a !== undefined ? Math.abs(a - p.val) <= p.tol : null }];
    }))
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }));
  a.download = `WP001-validation-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function exportCSV() {
  const header = 'parametri,paperi,fingrid,delta,toleranssi,match\n';
  const rows = Object.entries(PAPER).map(([k, p]) => {
    const a = results[k];
    const d = a !== undefined ? Math.abs(a - p.val) : '';
    const m = a !== undefined ? (Math.abs(a - p.val) <= p.tol ? 'MATCH' : 'DIFF') : 'N/A';
    return `${p.label},${p.val},${a !== undefined ? a.toFixed(4) : ''},${d !== '' ? d.toFixed(4) : ''},${p.tol},${m}`;
  }).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([header + rows], { type: 'text/csv' }));
  a.download = `WP001-validation-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function toggleRaw() {
  const el = document.getElementById('raw-out');
  const tg = document.getElementById('raw-toggle');
  const vis = el.style.display !== 'none';
  el.style.display = vis ? 'none' : 'block';
  tg.textContent = vis ? '▶ Näytä raakadata' : '▼ Piilota raakadata';
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function mean(arr) { return arr.reduce((s, v) => s + v, 0) / arr.length; }
function std(arr) {
  const m = mean(arr);
  return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length);
}
function percentile(arr, p) {
  const sorted = [...arr].sort((a, b) => a - b);
  const idx = Math.floor((p / 100) * sorted.length);
  return sorted[idx] || sorted[sorted.length - 1];
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setStatus(msg, type) {
  const b = document.getElementById('sb');
  b.innerHTML = msg; b.className = type; b.style.display = 'block';
}
function setBadge(txt, ok) {
  const b = document.getElementById('conn-badge');
  b.textContent = txt; b.className = ok ? 'badge live' : 'badge';
}
function showProgress(show, label = '', pct = 0) {
  const w = document.getElementById('prog-wrap');
  w.style.display = show ? 'block' : 'none';
  document.getElementById('prog-label').textContent = label;
  document.getElementById('prog-fill').style.width = pct + '%';
}
function addLog(type, msg) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'll-' + type;
  d.textContent = `[${new Date().toLocaleTimeString('fi-FI')}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
