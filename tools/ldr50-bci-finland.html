<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LDR-50 Rationality Field · ACI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{
  --ink:#0e0d0b;--paper:#f5f0e8;--paper-2:#ede7d8;--paper-3:#e4dccb;
  --accent:#8b4513;--muted:#7a7468;--rule:#c8bfad;
  --serif:'EB Garamond',Georgia,serif;--mono:'DM Mono','Courier New',monospace;
  --p0:#1d4e8c;--p1:#8b6010;--p2:#4a6a8c;--p3:#8a8278;
  --p0bg:#eef2fa;--p1bg:#faf6e8;--p2bg:#f0f4f8;--p3bg:#f5f2ee;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:var(--paper);color:var(--ink);font-family:var(--serif);line-height:1.7;}
body::before{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:999;opacity:0.6;}

.dih{border-top:2px solid var(--ink);border-bottom:1px solid var(--rule);
  padding:1.1rem 2rem 1rem;max-width:1000px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:.8rem;}
.dih-inst{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.dih-ser{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;}
.dih-ser span{color:var(--accent);}
.dih-meta{font-family:var(--mono);font-size:.55rem;color:var(--muted);text-align:right;line-height:1.9;}

.wrap{max-width:1000px;margin:0 auto;padding:1.5rem 2rem 4rem;}

.instrument-grid{display:grid;grid-template-columns:300px 1fr;gap:1.5rem;align-items:start;}

.map-panel{border:1px solid var(--rule);background:var(--paper-2);}
.map-header{padding:.5rem .8rem;border-bottom:1px solid var(--rule);
  font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);display:flex;justify-content:space-between;}
.map-body{padding:.5rem;}

.right-panel{display:flex;flex-direction:column;gap:1rem;}

.readout{border:1px solid var(--rule);background:var(--paper-2);}
.readout-header{padding:.45rem .8rem;border-bottom:1px solid var(--rule);
  font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
.readout-body{padding:.8rem;}

.city-name{font-family:var(--serif);font-size:1.05rem;font-weight:500;margin-bottom:.5rem;}
.metric-row{display:flex;justify-content:space-between;align-items:baseline;
  padding:.2rem 0;border-bottom:1px solid var(--paper-3);font-size:.82rem;}
.metric-label{font-family:var(--mono);font-size:.62rem;color:var(--muted);}
.metric-value{font-family:var(--mono);font-size:.72rem;font-weight:500;}

.zone-badge{display:inline-block;padding:.1rem .5rem;font-family:var(--mono);
  font-size:.6rem;letter-spacing:.08em;border:1px solid currentColor;}

.legend-panel .readout-body{display:grid;gap:.4rem;}
.legend-row{display:flex;align-items:center;gap:.6rem;font-size:.8rem;}
.legend-shape{width:14px;height:14px;flex-shrink:0;}
.legend-note{font-family:var(--mono);font-size:.58rem;color:var(--muted);margin-left:auto;}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}
.stat-cell{padding:.4rem .6rem;background:var(--paper-3);font-family:var(--mono);font-size:.62rem;}
.stat-val{font-size:1.1rem;font-weight:500;display:block;margin-bottom:.1rem;}

.toggle-row{display:flex;gap:.5rem;padding:.8rem;}
.tog{font-family:var(--mono);font-size:.62rem;padding:.2rem .7rem;
  background:transparent;border:1px solid var(--rule);cursor:pointer;color:var(--muted);}
.tog.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

.placeholder{padding:1.5rem;text-align:center;font-family:var(--mono);
  font-size:.7rem;color:var(--muted);border:1px dashed var(--rule);}

svg text{font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div class="dih">
  <div>
    <div class="dih-inst">Aether Continuity Institute</div>
    <div class="dih-ser">LDR-50 Rationality Field · <span>Finland</span></div>
  </div>
  <div class="dih-meta">
    TN-022 §01A · Companion instrument<br>
    BCI surface · 24 nodes · Synthetic model<br>
    Version 0.1 · June 2026
  </div>
</div>

<div id="root"></div>

<script>
const { useState } = React;

const CITIES = [
  ["Helsinki metro", 60.17, 24.94, 1400, 0.38, 0.8, 1.0],
  ["Tampere",        61.50, 23.76,  420, 0.32, 0.6, 0.9],
  ["Turku",          60.45, 22.27,  380, 0.30, 0.5, 0.8],
  ["Oulu",           65.01, 25.47,  280, 0.28, 0.7, 0.8],
  ["Jyväskylä",      62.24, 25.75,  180, 0.25, 0.4, 0.7],
  ["Kuopio",         62.90, 27.68,  160, 0.24, 0.5, 0.7],
  ["Lahti",          60.98, 25.66,  160, 0.26, 0.5, 0.7],
  ["Pori",           61.48, 21.80,  130, 0.24, 0.5, 0.6],
  ["Kouvola",        60.87, 26.71,  110, 0.22, 0.4, 0.6],
  ["Vaasa",          63.10, 21.61,  100, 0.22, 0.4, 0.6],
  ["Joensuu",        62.60, 29.76,  100, 0.22, 0.3, 0.6],
  ["Lappeenranta",   61.06, 28.19,   95, 0.22, 0.4, 0.6],
  ["Hämeenlinna",    60.99, 24.46,   95, 0.23, 0.3, 0.6],
  ["Kotka",          60.47, 26.94,   90, 0.22, 0.5, 0.6],
  ["Seinäjoki",      62.79, 22.83,   85, 0.20, 0.3, 0.5],
  ["Mikkeli",        61.69, 27.27,   75, 0.20, 0.3, 0.5],
  ["Rauma",          61.13, 21.50,   65, 0.20, 0.3, 0.5],
  ["Kemi",           65.73, 24.56,   60, 0.18, 0.5, 0.5],
  ["Rovaniemi",      66.50, 25.73,   70, 0.18, 0.2, 0.4],
  ["Varkaus",        62.31, 27.88,   55, 0.18, 0.4, 0.5],
  ["Tornio",         65.85, 24.14,   50, 0.17, 0.3, 0.4],
  ["Iisalmi",        63.56, 27.19,   40, 0.16, 0.2, 0.4],
  ["Kajaani",        64.22, 27.73,   55, 0.16, 0.2, 0.4],
  ["Savonlinna",     61.87, 28.88,   45, 0.18, 0.2, 0.4],
];

const ZONE_CFG = {
  P0:{label:"LDR-50 core",   color:"#1d4e8c", bg:"#eef2fa", shape:"rect"},
  P1:{label:"LDR-50 viable", color:"#8b6010", bg:"#faf6e8", shape:"diamond"},
  P2:{label:"S-2 preferred", color:"#4a6a8c", bg:"#f0f4f8", shape:"circle"},
  P3:{label:"S-1 / S-2",     color:"#8a8278", bg:"#f5f2ee", shape:"circle"},
};

function calcLRF(d,p,c,g){
  const b=Math.min((d*p)/50,1),dn=Math.min(p/1400,1);
  return 0.40*b+0.25*dn+0.20*c+0.15*g;
}
function getZone(lrf){
  if(lrf>0.75)return"P0";if(lrf>0.60)return"P1";if(lrf>0.40)return"P2";return"P3";
}
function nodeClass(p){if(p<80)return"N-1";if(p<200)return"N-2";if(p<500)return"N-3";return"N-4";}

const LAT_MIN=59.5,LAT_MAX=70.5,LON_MIN=19.0,LON_MAX=31.8,SW=280,SH=430;
function proj(lat,lon){
  return[((lon-LON_MIN)/(LON_MAX-LON_MIN))*SW,((LAT_MAX-lat)/(LAT_MAX-LAT_MIN))*SH];
}

function Shape({x,y,r,shape,fill,stroke,sw}){
  const s={fill,stroke,strokeWidth:sw};
  if(shape==="rect")return React.createElement("rect",{x:x-r*.8,y:y-r*.8,width:r*1.6,height:r*1.6,...s});
  if(shape==="diamond")return React.createElement("polygon",{points:`${x},${y-r} ${x+r},${y} ${x},${y+r} ${x-r},${y}`,...s});
  return React.createElement("circle",{cx:x,cy:y,r,...s});
}

function App(){
  const [hov,setHov]=useState(null);
  const [mode,setMode]=useState("lrf");

  const cities=CITIES.map(([name,lat,lon,peak,dmin,co2,grid])=>{
    const lrf=calcLRF(dmin,peak,co2,grid);
    const z=getZone(lrf);
    const bci=(dmin*peak)/50;
    const[x,y]=proj(lat,lon);
    const r=Math.max(5,Math.min(20,Math.sqrt(peak)*.75));
    return{name,lat,lon,peak,bci,lrf,z,x,y,r,nc:nodeClass(peak)};
  });

  const sel=hov?cities.find(c=>c.name===hov):null;

  return React.createElement("div",{className:"wrap"},
    React.createElement("div",{className:"instrument-grid"},

      // LEFT: MAP
      React.createElement("div",{className:"map-panel"},
        React.createElement("div",{className:"map-header"},
          React.createElement("span",null,"Finland · 24 nodes"),
          React.createElement("div",{className:"toggle-row",style:{padding:0,gap:".3rem"}},
            ["lrf","bci"].map(m=>React.createElement("button",{key:m,
              className:`tog${mode===m?" active":""}`,
              onClick:()=>setMode(m)},m.toUpperCase())))),
        React.createElement("div",{className:"map-body"},
          React.createElement("svg",{viewBox:`0 0 ${SW} ${SH}`,style:{width:"100%",display:"block"}},
            // grid
            ...[60,62,64,66,68,70].map(lat=>{const[,y]=proj(lat,25);return React.createElement("line",{key:`lat${lat}`,x1:0,y1:y,x2:SW,y2:y,stroke:"#c8bfad",strokeWidth:.4,opacity:.4});}),
            ...[20,22,24,26,28,30].map(lon=>{const[x]=proj(65,lon);return React.createElement("line",{key:`lon${lon}`,x1:x,y1:0,x2:x,y2:SH,stroke:"#c8bfad",strokeWidth:.4,opacity:.4});}),
            // cities
            ...cities.map(c=>{
              const isH=hov===c.name;
              const zc=ZONE_CFG[c.z];
              let fillColor;
              if(mode==="bci"){
                const v=Math.min(c.bci,1.5)/1.5;
                fillColor=`hsl(${Math.round(220-v*180)},${Math.round(30+v*50)}%,${Math.round(60-v*30)}%)`;
              }else fillColor=zc.color;
              return React.createElement("g",{key:c.name,
                onMouseEnter:()=>setHov(c.name),onMouseLeave:()=>setHov(null),
                style:{cursor:"pointer"}},
                React.createElement(Shape,{x:c.x,y:c.y,r:c.r,shape:zc.shape,
                  fill:fillColor,stroke:isH?"#0e0d0b":fillColor,
                  sw:isH?1.5:.3}),
                isH&&React.createElement("circle",{cx:c.x,cy:c.y,r:c.r+4,
                  fill:"none",stroke:"#0e0d0b",strokeWidth:.8,opacity:.4}));
            }),
            // labels
            ...cities.filter(c=>c.peak>200).map(c=>
              React.createElement("text",{key:c.name+"_l",x:c.x+c.r+3,y:c.y+3,
                fontSize:7,fill:"#7a7468"},c.name.split(" ")[0]))
          )
        )
      ),

      // RIGHT PANEL
      React.createElement("div",{className:"right-panel"},

        // READOUT
        React.createElement("div",{className:"readout"},
          React.createElement("div",{className:"readout-header"},"Node readout"),
          React.createElement("div",{className:"readout-body"},
            sel
            ? React.createElement("div",null,
                React.createElement("div",{className:"city-name"},sel.name),
                React.createElement("span",{className:"zone-badge",
                  style:{color:ZONE_CFG[sel.z].color,borderColor:ZONE_CFG[sel.z].color,marginBottom:".6rem",display:"inline-block"}},
                  `${sel.z} — ${ZONE_CFG[sel.z].label}`),
                [["Node class",sel.nc],["Peak demand",`${sel.peak} MW`],
                 ["BCI",sel.bci.toFixed(2)],["LRF index",sel.lrf.toFixed(2)],
                 ["LDR-50",sel.bci>1.0?"structurally sound":sel.bci>0.6?"conditional":"PEM+HP preferred"],
                 ["S-config",sel.z==="P0"||sel.z==="P1"?"Node⁺ viable":"Node (no LDR)"]
                ].map(([k,v])=>
                  React.createElement("div",{className:"metric-row",key:k},
                    React.createElement("span",{className:"metric-label"},k),
                    React.createElement("span",{className:"metric-value",
                      style:{color:k==="LDR-50"?sel.bci>1?"#1d6a2d":sel.bci>.6?"#8b6010":"#8b2500":"inherit"}},v))))
            : React.createElement("div",{className:"placeholder"},"Hover over a node to read values"))),

        // LEGEND
        React.createElement("div",{className:"readout legend-panel"},
          React.createElement("div",{className:"readout-header"},"Zone classification"),
          React.createElement("div",{className:"readout-body"},
            Object.entries(ZONE_CFG).map(([z,{label,color,shape}])=>
              React.createElement("div",{key:z,className:"legend-row"},
                React.createElement("svg",{className:"legend-shape",viewBox:"-8 -8 16 16"},
                  shape==="rect"
                    ?React.createElement("rect",{x:-6,y:-6,width:12,height:12,fill:color})
                    :shape==="diamond"
                    ?React.createElement("polygon",{points:"0,-7 7,0 0,7 -7,0",fill:color})
                    :React.createElement("circle",{cx:0,cy:0,r:6,fill:color})),
                React.createElement("span",null,
                  React.createElement("strong",null,z)," — ",label),
                React.createElement("span",{className:"legend-note"},
                  z==="P0"?"LRF > 0.75":z==="P1"?"0.60–0.75":z==="P2"?"0.40–0.60":"< 0.40"))))),

        // STATS
        React.createElement("div",{className:"readout"},
          React.createElement("div",{className:"readout-header"},"National distribution"),
          React.createElement("div",{className:"readout-body"},
            React.createElement("div",{className:"stats-grid"},
              Object.keys(ZONE_CFG).map(z=>{
                const n=cities.filter(c=>c.z===z).length;
                return React.createElement("div",{className:"stat-cell",key:z,
                  style:{borderLeft:`3px solid ${ZONE_CFG[z].color}`}},
                  React.createElement("span",{className:"stat-val"},n),z+" "+ZONE_CFG[z].label);
              }),
              React.createElement("div",{className:"stat-cell",key:"ldr",
                style:{gridColumn:"1/-1",borderLeft:"3px solid #1d4e8c"}},
                React.createElement("span",{className:"stat-val"},
                  cities.filter(c=>c.bci>0.6).length+"/"+cities.length),
                "nodes BCI > 0.6")))),

        // NOTE
        React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:".58rem",
          color:"var(--muted)",lineHeight:1.8,padding:".5rem 0"}},
          "Synthetic model — representative Finnish municipalities. Not calibrated against real district heating data. ",
          React.createElement("a",{href:"/supplements/tn-022-node-capex-model.html",
            style:{color:"var(--accent)"}},
            "TN-022 full document →"))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
