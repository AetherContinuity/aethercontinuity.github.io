name: Update Sitemap & Check Indexes

on:
  push:
    branches: [main]
    paths:
      - 'papers/**'
      - 'supplements/**'
      - 'tools/**'
      - '*.html'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate sitemap and check indexes
        run: python scripts/update-site.py

      - name: Commit changes
        run: |
          git config user.name "AetherContinuity"
          git config user.email "action@github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "auto: update sitemap.xml [skip ci]"
          git push
