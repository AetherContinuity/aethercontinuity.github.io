<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Musiikki · Aether Continuity</title>
<meta name="description" content="Itsetuotettua musiikkia ja videoita. Instrumentaalinen, kokeellinen, pohjoinen."/>
<link rel="canonical" href="https://aethercontinuity.org/music/"/>
<style>
  :root {
    --ink: #1a1a1a; --paper: #fafaf8; --muted: #666; --rule: #ddd;
    --accent: #2a2a6a; --light: #f4f3ef;
    --serif: Georgia, 'Times New Roman', serif;
    --mono: 'Courier New', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--serif); background: var(--paper); color: var(--ink);
    max-width: 720px; margin: 0 auto; padding: 0 1.5rem 5rem; line-height: 1.7; }
  nav { border-bottom: 1px solid var(--rule); padding: .75rem 0; margin-bottom: 2.5rem;
    font-family: Arial, sans-serif; font-size: .82rem; display: flex; gap: 1.5rem; }
  nav a { color: var(--accent); text-decoration: none; }
  nav a:hover { text-decoration: underline; }
  h1 { font-size: 1.9rem; font-weight: normal; margin-bottom: .3rem; }
  .sub { color: var(--muted); font-style: italic; margin-bottom: 2.5rem; font-size: .95rem; }
  hr { border: none; border-top: 1px solid var(--rule); margin: 2rem 0; }

  /* Track card */
  .track { margin-bottom: 2rem; }
  .track-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: .5rem; }
  .track-num { font-family: var(--mono); font-size: .7rem; color: var(--muted);
    letter-spacing: .1em; min-width: 2rem; }
  .track-title { font-size: 1.05rem; font-weight: 600; }
  .track-meta { font-family: Arial, sans-serif; font-size: .75rem; color: var(--muted);
    margin-bottom: .6rem; letter-spacing: .05em; }
  .track-desc { font-size: .9rem; color: #444; margin-bottom: .75rem; }

  /* Audio player */
  audio { width: 100%; height: 36px; accent-color: var(--accent); }
  audio::-webkit-media-controls-panel { background: var(--light); }

  /* Video player */
  video { width: 100%; max-height: 400px; background: #000; border-radius: 2px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); }

  /* Section header */
  .section-label { font-family: var(--mono); font-size: .62rem; letter-spacing: .2em;
    text-transform: uppercase; color: var(--muted); margin: 2rem 0 1rem; }

  footer { margin-top: 4rem; border-top: 1px solid var(--rule); padding-top: 1rem;
    font-family: Arial, sans-serif; font-size: .72rem; color: var(--muted); }
  footer a { color: var(--muted); text-decoration: none; }
</style>
</head>
<body>

<nav>
  <a href="/">ACI</a>
  <a href="/fiction/">Fiktio</a>
  <a href="/music/">Musiikki</a>
</nav>

<h1>Musiikki</h1>
<p class="sub">Itsetuotettua · instrumentaalinen · kokeellinen · pohjoinen</p>

<hr>

<!-- ═══════════════════════════════════════
     AUDIO-KAPPALEET
     Lisää kappale: kopioi .track-blokki,
     vaihda src, title, meta, desc
════════════════════════════════════════ -->

<div class="section-label">Kappaleet · MP3</div>

<div class="track">
  <div class="track-header">
    <span class="track-num">01</span>
    <span class="track-title">—</span>
  </div>
  <div class="track-meta">— · — min</div>
  <audio controls preload="none">
    <source src="tracks/01.mp3" type="audio/mpeg">
  </audio>
</div>

<!-- Lisää tänne uusia .track -blokkeja -->


<hr>

<!-- ═══════════════════════════════════════
     VIDEOT
     Lisää video: kopioi .track-blokki,
     vaihda src, title, meta, desc
════════════════════════════════════════ -->

<div class="section-label">Videot · MP4</div>

<div class="track">
  <div class="track-header">
    <span class="track-num">V1</span>
    <span class="track-title">—</span>
  </div>
  <div class="track-meta">— · — min</div>
  <video controls preload="none" poster="">
    <source src="videos/v1.mp4" type="video/mp4">
  </video>
</div>

<!-- Lisää tänne uusia .track -blokkeja -->


<footer>
  Aether Continuity · <a href="/">aethercontinuity.org</a> ·
  <a href="/aether-one/">Aether One</a> ·
  <a href="/fiction/">Fiktio</a>
</footer>

</body>
</html>
